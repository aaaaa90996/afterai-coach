<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AfterAI Coach 学习地图</title>
    <link rel="stylesheet" href="./dashboard.css">
  </head>
  <body>
    <main class="shell">
      <aside class="rail">
        <div>
          <p class="brand">AfterAI Coach</p>
          <h1>学习地图</h1>
          <p class="intro">每天从 AI 帮你完成的任务里，捞回一小块真正属于你的能力。</p>
        </div>
        <section class="stats" aria-label="学习概览">
          <div>
            <span id="stat-days">0</span>
            <p>记录天数</p>
          </div>
          <div>
            <span id="stat-pending">0</span>
            <p>待学习</p>
          </div>
          <div>
            <span id="stat-learned">0</span>
            <p>已学会</p>
          </div>
          <div>
            <span id="stat-favorites">0</span>
            <p>收藏</p>
          </div>
        </section>
        <button id="refresh" type="button">刷新地图</button>
        <section class="import-box">
          <h2>本地 Agent</h2>
          <p>导入终端脚本生成的复盘 JSON。</p>
          <label for="import-records">导入 JSON</label>
          <input id="import-records" type="file" accept="application/json,.json">
          <span id="import-status" role="status"></span>
        </section>
      </aside>

      <section class="workspace">
        <header class="workspace-header">
          <div>
            <p>Daily Learning Plan</p>
            <h2>按天展开你的 AI 学习痕迹</h2>
          </div>
          <a href="./options.html" target="_blank" rel="noreferrer">设置模型</a>
        </header>

        <section class="filters" aria-label="筛选学习点">
          <label>
            <span>关键词</span>
            <input id="search" type="search" placeholder="搜索知识点或学习方法">
          </label>
          <label>
            <span>状态</span>
            <select id="status-filter">
              <option value="all">全部</option>
              <option value="pending">待学习</option>
              <option value="learned">已学会</option>
              <option value="favorite">收藏夹</option>
            </select>
          </label>
          <label>
            <span>层级</span>
            <select id="level-filter">
              <option value="all">全部层级</option>
              <option value="today">今天学</option>
              <option value="practice">练几次</option>
              <option value="later">以后学</option>
            </select>
          </label>
        </section>

        <section class="insights" aria-label="能力总览">
          <article>
            <div class="section-title">
              <h3>能力雷达</h3>
              <span>按知识点自动归类</span>
            </div>
            <div id="ability-radar" class="radar-list"></div>
          </article>
          <article>
            <div class="section-title">
              <h3>AI 依赖度</h3>
              <span id="dependency-summary">还没有评分</span>
            </div>
            <div class="dependency-meter">
              <span id="dependency-bar"></span>
            </div>
          </article>
        </section>

        <section class="tool-row" aria-label="导出和复习">
          <button id="export-cards" type="button">导出学习卡片</button>
          <span id="export-status" role="status"></span>
        </section>

        <section class="growth-board" aria-label="成长线和错题本">
          <article>
            <div class="section-title">
              <h3>同类任务成长线</h3>
              <span>重复出现的能力线索</span>
            </div>
            <div id="growth-lines" class="mini-list"></div>
          </article>
          <article>
            <div class="section-title">
              <h3>错题本</h3>
              <span>AI 可疑点和你标记的问题</span>
            </div>
            <div id="mistake-book" class="mini-list"></div>
          </article>
        </section>

        <div id="empty" class="empty" hidden>
          <h3>还没有学习记录</h3>
          <p>去 AI 网页完成一次任务，点击“教我这次任务”，这里就会出现当天的学习地图。</p>
        </div>

        <div id="timeline" class="timeline" aria-live="polite"></div>
      </section>
    </main>

    <script src="./shared.js"></script>
    <script src="./dashboard.js"></script>
  </body>
</html>
