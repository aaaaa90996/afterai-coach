<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AfterAI Coach</title>
    <link rel="stylesheet" href="./popup.css">
  </head>
  <body>
    <main>
      <h1>AfterAI Coach</h1>
      <p>在支持的 AI 网页里，点击回答下方的“教我这次任务”。</p>
      <div class="actions">
        <button id="open-dashboard" type="button">打开学习地图</button>
        <button id="open-options" type="button">设置</button>
      </div>
      <div class="actions secondary-actions">
        <button id="enable-current-page" type="button">启用当前页</button>
        <button id="diagnose-current-page" type="button">诊断当前页</button>
      </div>
      <p id="status" role="status"></p>
    </main>
    <script src="./popup.js"></script>
  </body>
</html>
